<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Task Manager</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    color: #558390;
    background: linear-gradient(135deg, #60a5d0, #74bce3, #5480a9);
    min-height: 100vh;
}
.container {
    max-width: 600px;
    margin: auto;
    background: rgba(255, 255, 255, 0.25);
    backdrop-filter: blur(12px);
    padding: 20px;
    border-radius: 18px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    border: 1px solid rgba(255,255,255,0.3);
}
h2 {
    text-align: center;
    color: #34495e;
}
input, select {
    padding: 10px;
    margin: 6px 0;
    width: 100%;
    border-radius: 8px;
    border: none;
    background: rgba(255,255,255,0.5);
    outline: none;
    box-sizing: border-box;
}
button {
    padding: 10px;
    margin-top: 5px;
    width: 100%;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg, #74b9ff, #cb53e1);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}
button:hover {
    background: linear-gradient(135deg, #6c5ce7, #74b9ff);
}
.task {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(210, 90, 90, 0.35);
    margin-top: 10px;
    padding: 12px;
    border-radius: 12px;
    backdrop-filter: blur(6px);
    border-left: 4px solid #6c5ce7;
}
.completed {
    text-decoration: line-through;
    color: #457d91;
}
.actions button {
    width: auto;
    margin-left: 5px;
    padding: 6px 10px;
    background: #a29bfe;
    margin-top: 0;
}
.actions button:hover {
    background: #6c5ce7;
    color: white;
}
.due-status {
    font-size: 12px;
    font-weight: bold;
}
.overdue { color: #d63031; }
.today   { color: #e17055; }
.tomorrow{ color: #0984e3; }
</style>
</head>
<body>
<div class="container">
    <h2>Student Task Manager</h2>
    <input type="text" id="taskInput" placeholder="Enter task">
    <input type="date" id="dueDate">
    <button onclick="addTask()">Add Task</button>
    <input type="text" id="search" placeholder="Search..." onkeyup="renderTasks()">
    <select id="filter" onchange="renderTasks()">
        <option value="all" selected>All</option>
        <option value="completed">Completed</option>
        <option value="pending">Pending</option>
    </select>
    <div id="taskList"></div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function saveTasks() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask() {
    const text = document.getElementById("taskInput").value.trim();
    const due = document.getElementById("dueDate").value;
    if (text === "") {
        alert("Enter task!");
        return;
    }
    tasks.push({
        id: Date.now(),
        text,
        due,
        completed: false
    });
    saveTasks();
    document.getElementById("taskInput").value = "";
    document.getElementById("dueDate").value = "";
    renderTasks();
}

function deleteTask(id) {
    tasks = tasks.filter(task => task.id !== id);
    saveTasks();
    renderTasks();
}

function toggleTask(id) {
    tasks = tasks.map(task => {
        if (task.id === id) task.completed = !task.completed;
        return task;
    });
    saveTasks();
    renderTasks();
}

function editTask(id) {
    const task = tasks.find(t => t.id === id);
    const newText = prompt("Edit task:", task.text);
    if (newText && newText.trim() !== "") {
        task.text = newText.trim();
        saveTasks();
        renderTasks();
    }
}

function getDueStatus(dueDate) {
    if (!dueDate) return "";
    const today = new Date();
    const due = new Date(dueDate);
    today.setHours(0,0,0,0);
    due.setHours(0,0,0,0);
    const diffDays = (due - today) / (1000 * 60 * 60 * 24);
    if (diffDays === 0) return "⚠️ Due Today";
    if (diffDays === 1) return "⏰ Due Tomorrow";
    if (diffDays < 0) return "❌ Overdue";
    return "";
}

function renderTasks() {
    const list = document.getElementById("taskList");
    const filter = document.getElementById("filter").value || "all";
    const search = document.getElementById("search").value.toLowerCase();
    list.innerHTML = "";
    let filtered = tasks.filter(task =>
        task.text.toLowerCase().includes(search)
    );
    if (filter === "completed") {
        filtered = filtered.filter(t => t.completed);
    } else if (filter === "pending") {
        filtered = filtered.filter(t => !t.completed);
    }
    if (filtered.length === 0) {
        list.innerHTML = "<p style='text-align:center;'>No tasks found</p>";
        return;
    }
    filtered.forEach(task => {
        const div = document.createElement("div");
        div.className = "task";
        const status = getDueStatus(task.due);
        let statusClass = "";
        if (status.includes("Overdue")) statusClass = "overdue";
        else if (status.includes("Today")) statusClass = "today";
        else if (status.includes("Tomorrow")) statusClass = "tomorrow";
        div.innerHTML = `
            <div class="${task.completed ? 'completed' : ''}">
                <strong>${task.text}</strong><br>
                <small>Due: ${task.due || "No date"}</small><br>
                <span class="due-status ${statusClass}">${status}</span>
            </div>
            <div class="actions">
                <button onclick="toggleTask(${task.id})">✔</button>
                <button onclick="editTask(${task.id})">✏</button>
                <button onclick="deleteTask(${task.id})">❌</button>
            </div>
        `;
        list.appendChild(div);
    });
}

renderTasks();
</script>
</body>
</html>
